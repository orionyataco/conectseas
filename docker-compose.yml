version: "3.8"

services:
  app:
    build:
      context: .
    image: conectseas-app:latest
    restart: always
    env_file:
      - .env.production
    ports:
      - "3102:3002"
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/server/uploads
    networks:
      - local-network

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env.production
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - local-network

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8085:8080"
    networks:
      - local-network

networks:
  local-network:
    external: true

